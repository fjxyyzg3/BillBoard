name: billboard-dev

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: billboard_dev
      POSTGRES_USER: billboard
      POSTGRES_PASSWORD: billboard
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

volumes:
  postgres-dev-data:
